<!DOCTYPE html>
<html>
<head>
  <title>Cart - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .item { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🛒 Your Cart</h1>
  <div id="cart-items">Cart load ho raha hai...</div>
  <h3 id="total"></h3>

<script>
async function loadCart() {
  try {
    console.log('API call kar raha...')
    const res = await fetch('/api/cart')
    
    if (!res.ok) throw new Error('API Error: ' + res.status)
    
    const cart = await res.json()
    console.log('Cart data:', cart)
    
    let html = ''
    let total = 0
    
    if (cart.length === 0) {
      html = '<p>Cart khali hai baba. Food page se kuch order kar.</p>'
    } else {
      cart.forEach(item => {
        const itemTotal = item.price * item.qty
        total += itemTotal
        html += `
          <div class="item">
            <b>${item.name}</b><br>
            ₹${item.price} x ${item.qty} = ₹${itemTotal}
          </div>
        `
      })
    }
    
    document.getElementById('cart-items').innerHTML = html
    document.getElementById('total').innerText = 'Total: ₹' + total
    
  } catch (err) {
    console.error(err)
    document.getElementById('cart-items').innerHTML = 'Error: ' + err.message + '<br>Refresh karke dekh'
  }
}

loadCart()
</script>
</body>
</html>
