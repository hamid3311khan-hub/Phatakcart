<!DOCTYPE html>
<html>
<head>
    <title>Food - Phatakcart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
      .header { background: #ff6b00; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
      .back { padding: 15px; }
      .back a { color: #ff6b00; text-decoration: none; font-size: 18px; }
      .products { padding: 15px; }
      .item { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header">🍗 FOOD ITEMS</div>
    <div class="back"><a href="/">← Back to Home</a></div>
    <div id="products" class="products">Loading...</div>

<script>
async function loadFood() {
    const res = await fetch('/api/products?cat=1');
    const data = await res.json();
    document.getElementById('products').innerHTML = data.map(p => `
        <div class="item">
            <div><b>${p.name}</b><br>₹${p.price}</div>
            <button onclick="alert('Order feature next')">Add</button>
        </div>
    `).join('');
}
loadFood();
</script>
</body>
</html>
