<!DOCTYPE html>
<html>
<head>
    <title>Phatakcart - Andheri Delivery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
      .header { background: #ff6b00; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
      .cats { display: flex; justify-content: space-around; padding: 15px; }
      .cat-btn { background: white; border: 2px solid #ff6b00; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; text-decoration: none; color: black; }
      .cat-btn.active { background: #ff6b00; color: white; }
      .products { padding: 15px; }
      .item { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
      .coming { text-align: center; padding: 50px; font-size: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="header">PHATAKCART 🚚<br><small>Food, Dress & Grocery</small></div>
    
    <div class="cats">
        <!-- FOOD BUTTON KO LINK BANA DIYA -->
        <a href="/food" class="cat-btn active">🍗 Food</a>
        <a href="/dress" class="cat-btn">👗 Dress</a>
        <a href="/grocery" class="cat-btn">🛒 Grocery</a>
    </div>

    <div id="products" class="products">
        <div class="coming">Food page pe click karo 🍗</div>
    </div>

</body>
</html>
