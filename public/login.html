<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MyShop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { text-align: center; margin-bottom: 20px; color: #232f3e; }
    .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: none; border: none; font-size: 16px; }
    .tab.active { border-bottom: 3px solid #ff9900; color: #ff9900; font-weight: bold; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    button.submit { width: 100%; padding: 12px; background: #ff9900; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button.submit:hover { background: #e88a00; }
    .links { text-align: center; margin-top: 15px; font-size: 14px; }
    .links a { color: #007185; text-decoration: none; }
    .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>MyShop Login</h2>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('user')">Customer Login</button>
      <button class="tab" onclick="switchTab('admin')">Admin Login</button>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <!-- USER LOGIN FORM -->
    <form id="userForm" onsubmit="loginUser(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="userEmail" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="userPassword" required>
      </div>
      <button type="submit" class="submit">Login as Customer</button>
      <div class="links">
        <a href="/register.html">New user? Register here</a>
      </div>
    </form>

    <!-- ADMIN LOGIN FORM -->
    <form id="adminForm" style="display:none" onsubmit="loginAdmin(event)">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="adminEmail" value="admin@yourshop.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" required>
      </div>
      <button type="submit" class="submit">Login as Admin</button>
    </form>
  </div>

  <script>
    const API_URL = '/api';
    let currentTab = 'user';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('userForm').style.display = tab === 'user' ? 'block' : 'none';
      document.getElementById('adminForm').style.display = tab === 'admin' ? 'block' : 'none';
      hideMessage();
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error').style.display = 'none';
    }

    function hideMessage() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }

    // CUSTOMER LOGIN
    async function loginUser(e) {
      e.preventDefault();
      hideMessage();
      
      const email = document.getElementById('userEmail').value;
      const password = document.getElementById('userPassword').value;

      try {
        const res = await fetch(`${API_URL}/auth?action=login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('userType', 'customer');
          showSuccess('Login success! Redirecting...');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Server error. Try again.');
      }
    }

    // ADMIN LOGIN
    async function loginAdmin(e) {
      e.preventDefault();
      hideMessage();
      
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;

      try {
        const res = await fetch(`${API_URL}/auth?action=admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data.admin));
          localStorage.setItem('userType', 'admin');
          showSuccess('Admin login success! Redirecting...');
          setTimeout(() => window.location.href = '/admin.html', 1000);
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Server error. Try again.');
      }
    }
  </script>
</body>
  </html>
