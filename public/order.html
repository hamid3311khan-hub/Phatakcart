<!DOCTYPE html>
<html>
<head>
  <title>Order - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .nav { margin-bottom: 20px; }
   .nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
   .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { background: #ff6f00; color: white; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 5px; font-size: 16px; margin-top: 10px; }
    button:hover { background: #e65100; }
   .order-summary { background: #f9f9f9; padding: 15px; border-radius: 5px; margin: 15px 0; }
   .item { display: flex; justify-content: space-between; margin: 5px 0; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Home</a> | <a href="/food">Food</a> | <a href="/cart">Cart</a>
  </div>
  
  <div class="container">
    <h1>📦 Order Details</h1>
    <div class="order-summary" id="orderSummary">Loading...</div>
    
    <h3>Delivery Details</h3>
    <input type="text" id="name" placeholder="Apna naam" required>
    <input type="text" id="phone" placeholder="Phone number" required>
    <textarea id="address" placeholder="Full address" rows="3" required></textarea>
    
    <button onclick="proceedToPayment()">Proceed to Payment</button>
  </div>

<script>
let cartData = []

async function loadOrder() {
  const res = await fetch('/api/cart')
  cartData = await res.json()
  
  if (cartData.length === 0) {
    document.getElementById('orderSummary').innerHTML = '<p>Cart khali hai. Pehle kuch add kar.</p>'
    return
  }
  
  let html = '<h3>Your Items:</h3>'
  let total = 0
  cartData.forEach(item => {
    const price = item.offer_price || item.price
    const itemTotal = price * item.qty
    total += itemTotal
    html += `<div class="item"><span>${item.name} x ${item.qty}</span><span>₹${itemTotal}</span></div>`
  })
  html += `<div class="item" style="font-weight:bold; border-top:2px solid #333; margin-top:10px; padding-top:10px;"><span>Total</span><span>₹${total}</span></div>`
  
  document.getElementById('orderSummary').innerHTML = html
}

async function proceedToPayment() {
  const name = document.getElementById('name').value
  const phone = document.getElementById('phone').value
  const address = document.getElementById('address').value
  
  if (!name || !phone || !address) {
    alert('Saare details bhar baba')
    return
  }
  
  const res = await fetch('/api/order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customerName: name, phone, address })
  })
  
  const data = await res.json()
  if (data.success) {
    window.location.href = `/payment?orderId=${data.orderIds[0]}&amount=${data.total}`
  } else {
    alert('Order create nahi hua: ' + data.error)
  }
}

loadOrder()
</script>
</body>
  </html>
