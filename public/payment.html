<!DOCTYPE html>
<html>
<head>
  <title>Payment - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; text-align: center; }
   .amount { font-size: 32px; color: #ff6f00; font-weight: bold; margin: 20px 0; }
   .payment-btn { background: #00c853; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 5px; font-size: 16px; margin: 10px 0; }
   .payment-btn:hover { background: #00a043; }
   .upi-btn { background: #5f259f; }
   .card-btn { background: #1a73e8; }
   .cod-btn { background: #ff6f00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💳 Payment Page</h1>
    <p>Order ID: <b id="orderId">Loading...</b></p>
    <div class="amount">₹<span id="amount">0</span></div>
    
    <h3>Payment Option Chuno:</h3>
    
    <button class="payment-btn upi-btn" onclick="payNow('UPI')">Pay via UPI</button>
    <button class="payment-btn card-btn" onclick="payNow('Card')">Pay via Card</button>
    <button class="payment-btn cod-btn" onclick="payNow('COD')">Cash on Delivery</button>
  </div>

<script>
const urlParams = new URLSearchParams(window.location.search)
const orderId = urlParams.get('orderId')
const amount = urlParams.get('amount')

document.getElementById('orderId').innerText = orderId
document.getElementById('amount').innerText = amount

async function payNow(method) {
  if (!confirm(`${method} se ₹${amount} pay karna hai?`)) return
  
  const res = await fetch(`/api/order/${orderId}/pay`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ paymentMethod: method })
  })
  const data = await res.json()
  
  if (data.success) {
    alert(`Payment Successful via ${method}! Order ${orderId} confirmed.`)
    window.location.href = '/'
  } else {
    alert('Payment failed')
  }
}
</script>
</body>
</html>
