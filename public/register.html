<!DOCTYPE html>
<html>
<head>
  <title>Vendor Registration - Phatakcart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: linear-gradient(135deg, #ff6f00 0%, #ff8f00 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
   .box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #ff6f00; text-align: center; margin-bottom: 10px; }
   .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
    input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
   .file-input { margin: 12px 0; }
   .file-input label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333; }
   .file-input input { border: 2px dashed #ff6f00; background: #fff9f0; }
    button { background: #00c853; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
    button:hover { background: #00a043; }
    button:disabled { background: #ccc; cursor: not-allowed; }
   .plan { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 15px 0; }
   .price { color: #ff6f00; font-size: 24px; font-weight: bold; }
   .note { background: #fff3cd; padding: 10px; border-radius: 5px; font-size: 12px; color: #856404; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🏪 Vendor Bano</h1>
    <p class="subtitle">KYC complete karke apna shop shuru karo</p>

    <input type="text" id="shopName" placeholder="Shop ka Naam *" required>
    <input type="text" id="phone" placeholder="Phone Number *" maxlength="10" required>
    <input type="password" id="password" placeholder="Password Banao *" required>
    <textarea id="address" placeholder="Shop ka Full Address *" rows="2" required></textarea>

    <div class="file-input">
      <label>Aadhar Card Upload * (PDF/JPG)</label>
      <input type="file" id="aadhar" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <div class="file-input">
      <label>Commercial Electricity Bill * (PDF/JPG)</label>
      <input type="file" id="electricity" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <div class="note">⚠️ Note: Document verify hone ke baad hi shop active hoga. 24 hours lag sakte hain.</div>

    <div class="plan">
      <strong>Starter Plan</strong>
      <div class="price">₹499 / month</div>
      <p style="font-size:13px; color:#666; margin-top:5px;">✓ Unlimited Products ✓ Orders Management ✓ 24/7 Support</p>
    </div>

    <button id="submitBtn" onclick="register()">Register Karo & Payment Karo</button>
    <p style="text-align:center; margin-top:15px; font-size:14px;">Pehle se account hai? <a href="/vendor" style="color:#ff6f00;">Login karo</a></p>
  </div>

<script>
async function register() {
  const shopName = document.getElementById('shopName').value;
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;
  const address = document.getElementById('address').value;
  const aadharFile = document.getElementById('aadhar').files[0];
  const electricityFile = document.getElementById('electricity').files[0];

  if (!shopName ||!phone ||!password ||!address ||!aadharFile ||!electricityFile) {
    alert('Saare fields bharo aur documents upload karo');
    return;
  }

  if (phone.length!== 10) {
    alert('Phone number 10 digit ka hona chahiye');
    return;
  }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').innerText = 'Uploading...';

  const formData = new FormData();
  formData.append('shopName', shopName);
  formData.append('phone', phone);
  formData.append('password', password);
  formData.append('address', address);
  formData.append('aadhar', aadharFile);
  formData.append('electricity', electricityFile);

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();
    if (data.success) {
      alert('Registration successful! Ab ₹499 payment karo shop activate karne ke liye');
      window.location.href = '/payment?vendor=' + data.vendorId;
    } else {
      alert('Error: ' + data.message);
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').innerText = 'Register Karo & Payment Karo';
    }
  } catch (err) {
    alert('Network error. Try again');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').innerText = 'Register Karo & Payment Karo';
  }
}
</script>
</body>
</html>
