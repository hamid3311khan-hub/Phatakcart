<!DOCTYPE html>
<html>
<head>
  <title>Vendor Dashboard - Phatakcart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
  .header { background: #ff6f00; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
  .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    input:focus { border-color: #ff6f00; outline: none; }
    button { background: #00c853; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #00a043; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
  .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
  .file-input { border: 2px dashed #ff6f00; background: #fff9f0; padding: 10px; margin: 8px 0; border-radius: 8px; }
  .product-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
  .product-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
  .logout-btn { background: #f44336; float: right; }
  .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .active { background: #c8e6c9; color: #2e7d32; }
  .pending { background: #fff9c4; color: #f57f17; }
  </style>
</head>
<body>
  <div id="loginBox" class="box">
    <h2>Vendor Login</h2>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>
    <p style="text-align:center; margin-top:15px;">New ho? <a href="/register" style="color:#ff6f00; font-weight:bold;">Register karo</a></p>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="header">
      <button class="logout-btn" onclick="logout()">Logout</button>
      <h1>Welcome, <span id="shopName"></span></h1>
      <p>Status: <span id="status" class="status-badge"></span></p>
      <p>KYC: <span id="kycStatus" class="status-badge"></span></p>
    </div>

    <div class="box">
      <h2>My Products</h2>
      <button onclick="openModal()">+ Add New Product</button>
      <div id="productList" style="margin-top:20px;"></div>
    </div>
  </div>

  <!-- Add Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <h2>Add Product</h2>
      <input type="text" id="pname" placeholder="Product Name *" required>
      <input type="number" id="pprice" placeholder="Price ₹ *" required>
      <input type="number" id="pstock" placeholder="Stock Quantity *" required>
      <textarea id="pdesc" placeholder="Description" rows="3" style="width:100%; padding:12px; margin:8px 0; border:2px solid #ddd; border-radius:8px; box-sizing:border-box;"></textarea>
      <div class="file-input">
        <label>Product Image * (Max 5MB)</label>
        <input type="file" id="pimage" accept=".jpg,.jpeg,.png" required>
      </div>
      <button id="addBtn" onclick="addProduct()">Save Product</button>
      <button onclick="closeModal()" style="background:#999; margin-top:10px;">Cancel</button>
    </div>
  </div>

<script>
let vendorData = null;

// Page load pe check karo token hai ya nahi
window.onload = () => {
  const token = localStorage.getItem('vendorToken');
  if (token) {
    checkAuth();
  }
};

async function checkAuth() {
  // Token se vendor data nikal ke dashboard dikha do
  const token = localStorage.getItem('vendorToken');
  if (!token) return;

  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    vendorData = { id: payload.vendorId };
    // Abhi ke liye dummy data, baad mein API se lao
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('shopName').innerText = 'Your Shop';
    loadProducts();
  } catch (e) {
    logout();
  }
}

async function login() {
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;

  if (!phone ||!password) {
    alert('Phone aur password dono daalo');
    return;
  }

  const res = await fetch('/api/vendor/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem('vendorToken', data.token);
    vendorData = data.vendor;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('shopName').innerText = vendorData.shop_name;
    document.getElementById('status').innerText = vendorData.active? 'Active' : 'Inactive';
    document.getElementById('status').className = `status-badge ${vendorData.active? 'active' : 'pending'}`;
    document.getElementById('kycStatus').innerText = vendorData.kyc_status;
    document.getElementById('kycStatus').className = `status-badge ${vendorData.kyc_status === 'approved'? 'active' : 'pending'}`;
    loadProducts();
  } else {
    alert('Login failed: ' + data.error);
  }
}

function logout() {
  localStorage.removeItem('vendorToken');
  vendorData = null;
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('phone').value = '';
  document.getElementById('password').value = '';
}

function openModal() {
  if (!vendorData.active) {
    alert('Admin approval ke baad hi product add kar sakte ho');
    return;
  }
  document.getElementById('productModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('productModal').style.display = 'none';
  document.getElementById('pname').value = '';
  document.getElementById('pprice').value = '';
  document.getElementById('pstock').value = '';
  document.getElementById('pdesc').value = '';
  document.getElementById('pimage').value = '';
}

async function addProduct() {
  const btn = document.getElementById('addBtn');
  const name = document.getElementById('pname').value;
  const price = document.getElementById('pprice').value;
  const stock = document.getElementById('pstock').value;
  const desc = document.getElementById('pdesc').value;
  const image = document.getElementById('pimage').files[0];

  if (!name ||!price ||!stock ||!image) {
    alert('Name, Price, Stock aur Image required hai');
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Uploading...';

  const formData = new FormData();
  formData.append('name', name);
  formData.append('price', price);
  formData.append('stock', stock);
  formData.append('description', desc);
  formData.append('image', image);

  try {
    const res = await fetch('/api/add-product', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('vendorToken')}` },
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      alert('Product added successfully!');
      closeModal();
      loadProducts();
    } else {
      alert('Error: ' + data.message);
    }
  } catch (err) {
    alert('Network error: ' + err.message);
  }

  btn.disabled = false;
  btn.innerText = 'Save Product';
}

async function loadProducts() {
  try {
    const res = await fetch('/api/vendor/products', {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('vendorToken')}` }
    });
    const data = await res.json();

    const list = document.getElementById('productList');
    if (data.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#666;">Koi product nahi hai. Add karo.</p>';
      return;
    }

    list.innerHTML = data.map(p => `
      <div class="product-card">
        <img src="/uploads/${p.image_url}" alt="${p.name}">
        <div style="flex:1;">
          <h3 style="margin:0;">${p.name}</h3>
          <p style="margin:5px 0; color:#ff6f00; font-weight:bold;">₹${p.price}</p>
          <p style="margin:0; color:#666;">Stock: ${p.stock}</p>
        </div>
      </div>
    `).join('');
  } catch (err) {
    console.log('Products load nahi hue');
  }
}
</script>
</body>
  </html>
