{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h3 class="text-center mb-4">Create Your Resume</h3>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ candidate.full_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" value="{{ candidate.email }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ candidate.mobile }}">
                    </div>
                    <div class="mb-3">
                        <label>Professional Summary</label>
                        <textarea name="summary" class="form-control" rows="3" placeholder="2-3 lines about yourself"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Education</label>
                        <textarea name="education" class="form-control" rows="3" placeholder="B.Tech CSE - XYZ University - 2024"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Experience</label>
                        <textarea name="experience" class="form-control" rows="3" placeholder="Software Intern - ABC Corp - 6 months"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Skills</label>
                        <textarea name="skills" class="form-control" rows="2" placeholder="Python, Flask, JavaScript, SQL"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Generate Resume PDF</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
