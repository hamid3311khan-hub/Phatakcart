{% extends "base.html" %}
{% block title %}Edit Job - SureJob{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-4">Edit Job</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="title" class="form-control" value="{{ job['title'] }}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Location</label>
                                <input type="text" name="location" class="form-control" value="{{ job['location'] }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Job Type</label>
                                <select name="job_type" class="form-select" required>
                                    <option {{ 'selected' if job['job_type'] == 'Full Time' }}>Full Time</option>
                                    <option {{ 'selected' if job['job_type'] == 'Part Time' }}>Part Time</option>
                                    <option {{ 'selected' if job['job_type'] == 'Internship' }}>Internship</option>
                                    <option {{ 'selected' if job['job_type'] == 'Contract' }}>Contract</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Salary</label>
                                <input type="text" name="salary" class="form-control" value="{{ job['salary'] }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Experience</label>
                                <input type="text" name="experience" class="form-control" value="{{ job['experience'] }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Job Description</label>
                            <textarea name="description" class="form-control" rows="4" required>{{ job['description'] }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Requirements</label>
                            <textarea name="requirements" class="form-control" rows="4" required>{{ job['requirements'] }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Job</button>
                        <a href="/company-dashboard" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
