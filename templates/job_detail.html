{% extends "base.html" %}

{% block title %}{{ job.title }} at {{ job.company_name }} - SureJob{% endblock %}

{% block extra_css %}
<style>

   .job-header {border-bottom:1px solid var(--border); padding-bottom:24px; margin-bottom:32px;}
   .job-header h1 {font-size:32px; font-weight:800; margin-bottom:12px; line-height:1.3;}

        border-radius:12px; margin-bottom:32px;
    }
   .highlight {display:flex; align-items:flex-start; gap:14px;}

        color:var(--primary); font-size:22px; width:28px; height:28px;

    }
