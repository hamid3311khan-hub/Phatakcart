{% extends "base.html" %}
{% block title %}Post New Job{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4 class="mb-0">Post a New Job</h4></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('job.post_job') }}">
                    <div class="mb-3"><label class="form-label">Job Title <span class="text-danger">*</span></label><input type="text" name="title" class="form-control" placeholder="e.g. Python Developer, Sales Executive" required></div>
                    <div class="mb-3"><label class="form-label">Job Description <span class="text-danger">*</span></label><textarea name="description" class="form-control" rows="5" placeholder="Describe the role, responsibilities, requirements" required></textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Location <span class="text-danger">*</span></label><input type="text" name="location" class="form-control" placeholder="Delhi, Remote, Bangalore" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label">Salary <span class="text-danger">*</span></label><input type="text" name="salary" class="form-control" placeholder="5-8 LPA, 50K per month" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Type <span class="text-danger">*</span></label>
                            <select name="job_type" class="form-select" required>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                                <option value="Remote">Remote</option>
                                <option value="Internship">Internship</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3"><label class="form-label">Experience Required</label><input type="text" name="experience_required" class="form-control" placeholder="2-5 years, Fresher, 0-1 year"></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Skills Required</label><input type="text" name="skills_required" class="form-control" placeholder="Python, Django, React, Communication, Sales"></div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-check-circle"></i> Post Job</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
