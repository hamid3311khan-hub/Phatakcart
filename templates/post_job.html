<!DOCTYPE html>
<html>
<head>
    <title>Job Post Karo - Surejob</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{font-family:Arial;max-width:500px;margin:20px auto;padding:20px}
        input,textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box}
        button{width:100%;padding:12px;background:#FF6B35;color:white;border:none;border-radius:5px;font-size:16px}
        label{font-weight:bold;margin-top:10px;display:block}
    </style>
</head>
<body>
    <h2>🔥 Nayi Job Post Karo - FREE</h2>
    <p>60 Din tak unlimited jobs post karo</p>

    <form method="POST">
        <label>Job Title *</label>
        <input type="text" name="title" placeholder="Ex: Telecaller, Sales Executive" required>

        <label>Location *</label>
        <input type="text" name="location" placeholder="Ex: Delhi, Mumbai, Noida" required>

        <label>Salary</label>
        <input type="text" name="salary" placeholder="Ex: 15000-25000, 3 LPA">

        <label>Experience</label>
        <select name="experience">
            <option value="Fresher">Fresher</option>
            <option value="0-1 Year">0-1 Year</option>
            <option value="1-3 Years">1-3 Years</option>
            <option value="3+ Years">3+ Years</option>
        </select>

        <label>Job Description *</label>
        <textarea name="description" rows="4" placeholder="Kaam kya hai, requirement kya hai..." required></textarea>

        <label>Contact Number *</label>
        <input type="tel" name="contact_phone" placeholder="Candidates isi pe call/WhatsApp karenge" required>

        <button type="submit">🚀 Job Post Karo - FREE</button>
    </form>
    <p><a href="/dashboard">← Dashboard pe wapas</a></p>
</body>
</html>
